<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Risk Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 200px; padding: 5px; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #004c99; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Credit Risk Prediction Demo</h1>
    <form id="predictionForm">
        <div class="field">
            <label for="age">Age (18-100)</label>
            <input type="number" id="age" name="age" min="18" max="100" value="35" required>
        </div>
        <div class="field">
            <label for="annual_income">Annual Income ($)</label>
            <input type="number" id="annual_income" name="annual_income" min="0" value="72000" required>
        </div>
        <div class="field">
            <label for="loan_amount">Loan Amount ($)</label>
            <input type="number" id="loan_amount" name="loan_amount" min="0" value="15000" required>
        </div>
        <div class="field">
            <label for="loan_term_months">Loan Term (months)</label>
            <input type="number" id="loan_term_months" name="loan_term_months" min="1" max="120" value="36" required>
        </div>
        <div class="field">
            <label for="interest_rate">Interest Rate (%)</label>
            <input type="number" id="interest_rate" name="interest_rate" min="0" max="100" value="12.5" required>
        </div>
        <div class="field">
            <label for="debt_to_income">Debt to Income (0-1)</label>
            <input type="number" id="debt_to_income" name="debt_to_income" min="0" max="1" step="0.01" value="0.28" required>
        </div>
        <div class="field">
            <label for="credit_utilization">Credit Utilization (0-1)</label>
            <input type="number" id="credit_utilization" name="credit_utilization" min="0" max="1" step="0.01" value="0.45" required>
        </div>
        <div class="field">
            <label for="num_open_accounts">Number of Open Accounts</label>
            <input type="number" id="num_open_accounts" name="num_open_accounts" min="0" value="6" required>
        </div>
        <div class="field">
            <label for="num_delinquencies">Number of Delinquencies</label>
            <input type="number" id="num_delinquencies" name="num_delinquencies" min="0" value="0" required>
        </div>
        <div class="field">
            <label for="months_employed">Months Employed</label>
            <input type="number" id="months_employed" name="months_employed" min="0" value="48" required>
        </div>
        <div class="field">
            <label for="home_ownership">Home Ownership</label>
            <select id="home_ownership" name="home_ownership" required>
                <option value="rent">Rent</option>
                <option value="own">Own</option>
                <option value="mortgage">Mortgage</option>
            </select>
        </div>
        <div class="field">
            <label for="loan_purpose">Loan Purpose</label>
            <select id="loan_purpose" name="loan_purpose" required>
                <option value="debt_consolidation">Debt Consolidation</option>
                <option value="credit_card">Credit Card</option>
                <option value="home_improvement">Home Improvement</option>
                <option value="other">Other</option>
            </select>
        </div>
        <button type="submit">Predict Risk</button>
    </form>
    <div id="result" class="hidden">
        <h2>Prediction Result</h2>
        <p id="probability"></p>
        <p id="riskBand"></p>
        <p id="modelId"></p>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            for (const [key, value] of formData.entries()) {
                // convert numeric fields
                if (['age','annual_income','loan_amount','loan_term_months','interest_rate','debt_to_income','credit_utilization','num_open_accounts','num_delinquencies','months_employed'].includes(key)) {
                    data[key] = parseFloat(value);
                } else if (key === 'loan_term_months' || key === 'num_open_accounts' || key === 'num_delinquencies' || key === 'months_employed') {
                    data[key] = parseInt(value, 10);
                } else {
                    data[key] = value;
                }
            }
            // Ensure correct types
            data.loan_term_months = parseInt(data.loan_term_months, 10);
            data.num_open_accounts = parseInt(data.num_open_accounts, 10);
            data.num_delinquencies = parseInt(data.num_delinquencies, 10);
            data.months_employed = parseFloat(data.months_employed);
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                document.getElementById('probability').textContent = `Default Probability: ${(result.default_probability * 100).toFixed(2)}%`;
                document.getElementById('riskBand').textContent = `Risk Band: ${result.risk_band}`;
                document.getElementById('modelId').textContent = `Model ID: ${result.model_id}`;
                document.getElementById('result').classList.remove('hidden');
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
