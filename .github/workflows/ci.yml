name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: credit-risk-mlops:test
      - name: Run container
        run: |
          docker run -d --name credit-risk -p 8000:8000 credit-risk-mlops:test
          # wait for service to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "Service is healthy"
              break
            fi
            sleep 1
          done
      - name: Test API endpoint
        run: |
          curl -s http://localhost:8000/predict -X POST -H "Content-Type: application/json" -d '{"age":35,"annual_income":72000,"loan_amount":15000,"loan_term_months":36,"interest_rate":12.5,"debt_to_income":0.28,"credit_utilization":0.45,"num_open_accounts":6,"num_delinquencies":0,"months_employed":48,"home_ownership":"mortgage","loan_purpose":"debt_consolidation"}' | jq .
      - name: Test UI endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep "200"
      - name: Stop container
        if: always()
        run: docker stop credit-risk || true
